name: Nightly

on:
  schedule:
    # Run at 6:00 AM UTC every day (overnight for most timezones)
    - cron: '0 6 * * *'
  # Allow manual trigger for debugging
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test 2>&1 | tee test-output.log

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: test-output.log

      - name: Verify snapshots are committed
        uses: ./.github/actions/verify-snapshots

  report-failure:
    needs: test
    if: ${{ failure() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['nightly-failure'],
            });

            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const body = [
              '## ❌ Nightly test suite failed',
              '',
              'A scheduled test run failed. See the [workflow run](' + runUrl + ') for details.',
              '',
              '**Date:** ' + new Date().toUTCString(),
              '**Node versions:** 18, 20, 22',
              '**Workflow:** Nightly',
              '',
              'This issue was automatically created by the nightly workflow.',
            ].join('\n');

            if (existing.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Nightly test failure \u2014 ' + new Date().toISOString().slice(0, 10),
                body,
                labels: ['nightly-failure'],
              });
            } else {
              const issueNumber = existing[existing.length - 1].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'Another failure on ' + new Date().toUTCString() + ': ' + runUrl,
              });
            }

  close-issue:
    needs: test
    if: ${{ success() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Close resolved failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['nightly-failure'],
            });

            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ Nightly tests passed on ' + new Date().toUTCString() + '. Closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
